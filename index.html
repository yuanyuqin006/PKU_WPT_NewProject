<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>4-Coil Tx Array — Dynamic Current Allocation</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #141821;
    --panel2: #1a1f2b;
    --line: #2a2f3a;
    --text: #e8ecf2;
    --muted: #8a93a6;
    --c1: #ef4444;
    --c2: #f59e0b;
    --c3: #22c55e;
    --c4: #3b82f6;
    --gold: #fbbf24;
  }
    html, body { margin: 0; height: 100vh; background: var(--bg); color: var(--text);
        font-family: -apple-system, "SF Pro Text", Inter, "PingFang SC", sans-serif; overflow: hidden; }
      #app { display: flex; height: 100vh; width: 100vw; }
      #left  { flex: 1; display: flex; min-width: 0; overflow: hidden; }
      #leftA, #leftB { flex: 1; position: relative; min-width: 0; overflow: hidden; }
      #leftA { border-right: 1px solid var(--line); }
      #leftA canvas, #leftB canvas { display: block; width: 100% !important; height: 100% !important; }
  #right { width: 360px; flex: 0 0 360px; background: var(--panel);
    border-left: 1px solid var(--line); padding: 18px 20px; box-sizing: border-box;
    overflow-y: auto; }

  h1 { font-size: 16px; margin: 0 0 4px 0; letter-spacing: 0.3px; }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  .sect-title { font-size: 12px; color: var(--muted); text-transform: uppercase;
    letter-spacing: 1.2px; margin: 18px 0 8px 0; }

  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .row .lbl  { width: 38px; font-size: 12px; color: var(--muted); }
  .row .val  { width: 64px; font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; }
  .bar { flex: 1; height: 10px; background: var(--panel2); border-radius: 5px; overflow: hidden; position: relative; }
  .bar > i { display: block; height: 100%; width: 0%; transition: width 80ms linear, background 160ms linear; }
  .b1 > i { background: var(--c1); }
  .b2 > i { background: var(--c2); }
  .b3 > i { background: var(--c3); }
  .b4 > i { background: var(--c4); }

  .pct-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pct { background: var(--panel2); border-radius: 8px; padding: 10px 12px; }
  .pct .tag { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .pct .num { font-size: 22px; font-weight: 600; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .pct.p1 .num { color: var(--c1); }
  .pct.p2 .num { color: var(--c2); }
  .pct.p3 .num { color: var(--c3); }
  .pct.p4 .num { color: var(--c4); }

  .eff { margin-top: 6px; background: linear-gradient(135deg, #1f2738, #18202d);
    border-radius: 10px; padding: 14px 16px; border: 1px solid #28324a; }
  .eff .tag { font-size: 11px; color: var(--muted); letter-spacing: 1.4px; }
  .eff .num { font-size: 32px; font-weight: 700; color: var(--gold); margin-top: 2px;
    font-variant-numeric: tabular-nums; }
  .eff .hint { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

  #status { position: absolute; left: 14px; bottom: 12px; color: var(--muted); font-size: 12px;
    pointer-events: none; }
  #coords { position: absolute; right: 14px; bottom: 12px; color: var(--muted); font-size: 12px;
    font-variant-numeric: tabular-nums; pointer-events: none; }
</style>
</head>
<body>

<div id="app">
  <div id="left">
    <div id="leftA">
      <div id="status">加载 array_data.json …</div>
      <div id="coords">Rx (x, y) = (—, —) mm</div>
    </div>
    <div id="leftB"></div>
  </div>

  <div id="right">
      <h1>4-Coil Tx Array</h1>
      <div class="sub">拖拽金色 Rx 圆环实时查看电流动态分配</div>
      
      <div style="margin-bottom: 15px;">
        <select id="algoSelect" style="width: 100%; padding: 6px; background: var(--panel2); color: var(--text); border: 1px solid var(--line); border-radius: 4px; font-size: 12px; outline: none; cursor: pointer;">
          <option value="decoupled">MIMO 主动矩阵解耦 (零迫调谐)</option>
          <option value="original">传统最大比合并 (未解耦)</option>
        </select>
      </div>

      <div class="sect-title">Mutual Inductance (Mᵢ)</div>
    <div class="row"><div class="lbl">Tx1</div><div class="bar b1"><i id="bar1"></i></div><div class="val" id="m1">— nH</div></div>
    <div class="row"><div class="lbl">Tx2</div><div class="bar b2"><i id="bar2"></i></div><div class="val" id="m2">— nH</div></div>
    <div class="row"><div class="lbl">Tx3</div><div class="bar b3"><i id="bar3"></i></div><div class="val" id="m3">— nH</div></div>
    <div class="row"><div class="lbl">Tx4</div><div class="bar b4"><i id="bar4"></i></div><div class="val" id="m4">— nH</div></div>

    <div class="sect-title">Current Allocation (wᵢ)</div>
    <div class="pct-grid">
      <div class="pct p1"><div class="tag">Tx1</div><div class="num" id="w1">—</div></div>
      <div class="pct p2"><div class="tag">Tx2</div><div class="num" id="w2">—</div></div>
      <div class="pct p3"><div class="tag">Tx3</div><div class="num" id="w3">—</div></div>
      <div class="pct p4"><div class="tag">Tx4</div><div class="num" id="w4">—</div></div>
    </div>

    <div class="sect-title">System Efficiency</div>
    <div class="eff">
      <div class="tag">Relative Efficiency</div>
      <div class="num" id="eff">— %</div>
      <div class="hint">η = |eff| / EFF_MAX <br>[已全域归一化，支持算法横向对比]</div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
//  几何参数 (单位: mm in scene-space; data 也是 mm)
// ============================================================
const R_COIL = 50;
const TX_POS = [
  [0,  R_COIL],   // Tx1 上  (data y = +R)
  [0, -R_COIL],   // Tx2 下
  [-R_COIL, 0],   // Tx3 左
  [ R_COIL, 0],   // Tx4 右
];
const TX_COLORS = [0xef4444, 0xf59e0b, 0x22c55e, 0x3b82f6];
const TUBE = 1.2;
const AXIAL = 5;

// 拖拽范围 (匹配数据网格)
const GRID_MIN = -50, GRID_MAX = 50, GRID_STEP = 0.5;
const N = Math.round((GRID_MAX - GRID_MIN) / GRID_STEP) + 1;

// ============================================================
//  Scene
// ============================================================
const left = document.getElementById('leftA');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d12);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(0, 190, 130);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.outputColorSpace = THREE.SRGBColorSpace;
left.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const dirL = new THREE.DirectionalLight(0xffffff, 0.75);
dirL.position.set(50, 80, 40); scene.add(dirL);
const fillL = new THREE.DirectionalLight(0x88aaff, 0.25);
fillL.position.set(-40, 30, -30); scene.add(fillL);

scene.add(new THREE.GridHelper(240, 24, 0x2a2f3a, 0x1a1d24));
scene.add(new THREE.AxesHelper(60));

// ============================================================
//  3D Surface Plot Scene  (右边: x,y → Relative Efficiency)
// ============================================================
const leftB = document.getElementById('leftB');
const sceneB = new THREE.Scene();
sceneB.background = new THREE.Color(0x0b0d12);

const SURF_SIZE   = 100;          // 100 mm × 100 mm 的平面
const SURF_HEIGHT = 60;           // η = 1.0 对应高度 60 (单位与 mm 同视觉尺度)
const SURF_HALF   = SURF_SIZE / 2;
const CX_B = -SURF_HALF, CZ_B = -SURF_HALF;   // 坐标系角落 (放置 axes 的位置)

const cameraB = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
cameraB.position.set(135, 110, 135);
cameraB.lookAt(0, SURF_HEIGHT * 0.4, 0);

const rendererB = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
rendererB.outputColorSpace = THREE.SRGBColorSpace;
leftB.appendChild(rendererB.domElement);

const controlsB = new OrbitControls(cameraB, rendererB.domElement);
controlsB.target.set(0, SURF_HEIGHT * 0.4, 0);
controlsB.enableDamping = true;
controlsB.dampingFactor = 0.08;
controlsB.update();

sceneB.add(new THREE.AmbientLight(0xffffff, 0.65));
const dirB1 = new THREE.DirectionalLight(0xffffff, 0.65);
dirB1.position.set(80, 140, 60); sceneB.add(dirB1);
const dirB2 = new THREE.DirectionalLight(0xffffff, 0.30);
dirB2.position.set(-70, 80, -50); sceneB.add(dirB2);

// ---- 文字 sprite 工具 ----
function makeTextSprite(text, opts = {}) {
  const fontSize = opts.fontSize || 56;
  const color    = opts.color    || '#cfd6e4';
  const bold     = opts.bold ? 'bold ' : '';
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const g = c.getContext('2d');
  g.font = `${bold}${fontSize}px -apple-system, "SF Pro Text", Inter, sans-serif`;
  g.fillStyle = color;
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  g.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = 4;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sp = new THREE.Sprite(mat);
  const sx = opts.scaleX || 16;
  sp.scale.set(sx, sx * 0.25, 1);
  sp.renderOrder = 999;
  return sp;
}

// ---- 轴线 ----
const axisMatB = new THREE.LineBasicMaterial({ color: 0xa9b1c2 });
function axisLine(p1, p2) {
  const g = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(p1[0], p1[1], p1[2]),
    new THREE.Vector3(p2[0], p2[1], p2[2]),
  ]);
  return new THREE.Line(g, axisMatB);
}
sceneB.add(axisLine([CX_B, 0, CZ_B], [SURF_HALF, 0, CZ_B]));      // X 轴
sceneB.add(axisLine([CX_B, 0, CZ_B], [CX_B, SURF_HEIGHT, CZ_B])); // Y 轴 (Relative Efficiency)
sceneB.add(axisLine([CX_B, 0, CZ_B], [CX_B, 0, SURF_HALF]));      // Z 轴 (data y)

// ---- 底面网格 ----
sceneB.add(new THREE.GridHelper(SURF_SIZE, 10, 0x2a2f3a, 0x1a1d24));

// ---- 刻度 (短线段 + 数值标签) ----
const TICK_LEN = 2.2;
const xyTicks = [-50, -25, 0, 25, 50];
for (const v of xyTicks) {
  sceneB.add(axisLine([v, 0, CZ_B], [v, 0, CZ_B - TICK_LEN]));
  const lbl = makeTextSprite(String(v), { fontSize: 50, scaleX: 9 });
  lbl.position.set(v, -2.5, CZ_B - 6);
  sceneB.add(lbl);
}
for (const v of xyTicks) {
  sceneB.add(axisLine([CX_B, 0, v], [CX_B - TICK_LEN, 0, v]));
  const lbl = makeTextSprite(String(v), { fontSize: 50, scaleX: 9 });
  lbl.position.set(CX_B - 7, -2.5, v);
  sceneB.add(lbl);
}
const effTicks = [0.0, 0.25, 0.5, 0.75, 1.0];
for (const v of effTicks) {
  sceneB.add(axisLine([CX_B, v * SURF_HEIGHT, CZ_B], [CX_B - TICK_LEN, v * SURF_HEIGHT, CZ_B]));
  const lbl = makeTextSprite(v.toFixed(2), { fontSize: 48, scaleX: 10 });
  lbl.position.set(CX_B - 9, v * SURF_HEIGHT, CZ_B);
  sceneB.add(lbl);
}

// ---- 轴名 (放在每根轴最大刻度的旁边, 不放在中心) ----
const lblX = makeTextSprite('x (mm)', { color: '#fbbf24', bold: true, fontSize: 56, scaleX: 16 });
lblX.position.set(SURF_HALF + 9, -2.5, CZ_B - 6);
sceneB.add(lblX);

const lblZ = makeTextSprite('y (mm)', { color: '#fbbf24', bold: true, fontSize: 56, scaleX: 16 });
lblZ.position.set(CX_B - 7, -2.5, SURF_HALF + 9);
sceneB.add(lblZ);

const lblY = makeTextSprite('Relative Efficiency', { color: '#fbbf24', bold: true, fontSize: 52, scaleX: 32 });
lblY.position.set(CX_B + 2, SURF_HEIGHT + 6, CZ_B);
sceneB.add(lblY);

// ---- 曲面 (数据载入后构建) ----
let surfMesh = null;
function buildSurface() {
  if (!DATA) return;
  if (surfMesh) {
    sceneB.remove(surfMesh);
    surfMesh.geometry.dispose();
    surfMesh.material.dispose();
  }
  const gridN = N;
  const geom = new THREE.PlaneGeometry(SURF_SIZE, SURF_SIZE, gridN - 1, gridN - 1);
  geom.rotateX(-Math.PI / 2);

  const positions = geom.attributes.position;
  const colors = new Float32Array(positions.count * 3);
  const c = new THREE.Color();

  for (let i = 0; i < positions.count; i++) {
    const px = positions.array[i * 3];
    const pz = positions.array[i * 3 + 2];
    let dataIx = Math.round((px - GRID_MIN) / GRID_STEP);
    let dataIy = Math.round((pz - GRID_MIN) / GRID_STEP);
    dataIx = Math.max(0, Math.min(N - 1, dataIx));
    dataIy = Math.max(0, Math.min(N - 1, dataIy));
    const row = DATA[dataIy * N + dataIx];
    const eff = (currentMode === 'decoupled') ? row[15] : row[10];
    const rel = Math.min(1, Math.abs(eff) / EFF_MAX);

    positions.array[i * 3 + 1] = rel * SURF_HEIGHT;

    // 红 (rel=0, hue=0°) → 绿 (rel=1, hue=120°)
    c.setHSL(rel * (120 / 360), 0.85, 0.5);
    colors[i * 3]     = c.r;
    colors[i * 3 + 1] = c.g;
    colors[i * 3 + 2] = c.b;
  }

  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  positions.needsUpdate = true;
  geom.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 0.55, metalness: 0.08,
    side: THREE.DoubleSide,
  });
  surfMesh = new THREE.Mesh(geom, mat);
  sceneB.add(surfMesh);
}

// ---- 倒三角形标记 (尖端朝下指向当前 Rx 位置) ----
const MARKER_H = 5.5;
const markerGeom = new THREE.ConeGeometry(2.4, MARKER_H, 4);
markerGeom.rotateZ(Math.PI);          // 翻转: tip 从 +y 变为 -y
const markerMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24 });
const surfMarker = new THREE.Mesh(markerGeom, markerMat);
surfMarker.position.set(0, MARKER_H / 2 + 2, 0);
sceneB.add(surfMarker);

function updateSurfMarker(rxX, rxY, relEff) {
  const surfY = relEff * SURF_HEIGHT;
  // tip 在 mesh 局部 -y 方向, 偏移 MARKER_H/2 → 让 tip 距曲面 2mm
  const gap = 2.0;
  surfMarker.position.set(rxX, surfY + gap + MARKER_H / 2, rxY);
}

function resize() {
  const w = left.clientWidth, h = left.clientHeight;
  renderer.setSize(w, h, false);
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
  camera.aspect = w / Math.max(1, h);
  camera.updateProjectionMatrix();

  const wB = leftB.clientWidth, hB = leftB.clientHeight;
  rendererB.setSize(wB, hB, false);
  rendererB.setPixelRatio(Math.min(2, window.devicePixelRatio));
  cameraB.aspect = wB / Math.max(1, hB);
  cameraB.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ============================================================
//  Coils — 4 Tx (z=0) + 1 Rx (z=AXIAL)
// ============================================================
function makeCoil(radius, color, emissive = 0x000000, emInt = 0.1) {
  const geom = new THREE.TorusGeometry(radius, TUBE, 20, 128);
  const mat = new THREE.MeshStandardMaterial({
    color, metalness: 0.55, roughness: 0.35,
    emissive: new THREE.Color(emissive), emissiveIntensity: emInt,
  });
  const m = new THREE.Mesh(geom, mat);
  m.rotation.x = Math.PI / 2;
  return m;
}

const txCoils = TX_POS.map((p, i) => {
  const c = makeCoil(R_COIL, TX_COLORS[i], TX_COLORS[i], 0.05);
  const txY = (i >= 2) ? -1.2 : 0;
  c.position.set(p[0], txY, p[1]);
  scene.add(c);
  return c;
});

const rxCoil = makeCoil(R_COIL, 0xfbbf24, 0xfbbf24, 0.45);
rxCoil.position.set(0, AXIAL, 0);
scene.add(rxCoil);

const halo = new THREE.Mesh(
  new THREE.RingGeometry(R_COIL - 0.3, R_COIL + 0.3, 80),
  new THREE.MeshBasicMaterial({ color: 0xfbbf24, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
);
halo.rotation.x = -Math.PI / 2;
rxCoil.add(halo);

// ============================================================
//  Field lines & particles
// ============================================================
const NUM_LINES = 14;
const PARTICLES_PER_LINE = 4;
const SAMPLES_PER_CURVE = 48;

function glowTex() {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const g = c.getContext('2d');
  const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grd.addColorStop(0.0, 'rgba(255,255,255,1.0)');
  grd.addColorStop(0.3, 'rgba(255,255,255,0.55)');
  grd.addColorStop(1.0, 'rgba(255,255,255,0.0)');
  g.fillStyle = grd; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const GLOW = glowTex();

const groups = TX_POS.map((p, i) => {
  const lineMat = new THREE.LineBasicMaterial({
    color: TX_COLORS[i], transparent: true, opacity: 0.35,
  });
  const partMat = new THREE.SpriteMaterial({
    map: GLOW, color: TX_COLORS[i],
    blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
  });

  const curves = [], lines = [], particles = [];
  for (let k = 0; k < NUM_LINES; k++) {
    const geom = new THREE.BufferGeometry().setFromPoints(
      new Array(SAMPLES_PER_CURVE + 1).fill(0).map(() => new THREE.Vector3()));
    const line = new THREE.Line(geom, lineMat);
    scene.add(line);
    curves.push(null); lines.push(line);
  }
  for (let k = 0; k < NUM_LINES * PARTICLES_PER_LINE; k++) {
    const sp = new THREE.Sprite(partMat);
    sp.scale.set(2.4, 2.4, 1);
    scene.add(sp);
    particles.push({ sprite: sp, lineIdx: k % NUM_LINES, t: Math.random() });
  }

  return {
    txX: p[0], txZ: p[1], color: TX_COLORS[i],
    txY: (i >= 2) ? -1.2 : 0,
    coil: txCoils[i], coilMat: txCoils[i].material,
    lineMat, partMat,
    curves, lines, particles,
    speed: 0.05, intensity: 0.05,
  };
});

function rebuildCurves(g, rxX, rxZ) {
  const txPos = new THREE.Vector3(g.txX, g.txY, g.txZ);
  const rxPos = new THREE.Vector3(rxX, AXIAL, rxZ);
  
  const h_eff = AXIAL - g.txY;
  const lateral = Math.hypot(rxX - g.txX, rxZ - g.txZ);
  const bulge = 6 + 0.30 * lateral;
  
  for (let i = 0; i < NUM_LINES; i++) {
    const theta = (i / NUM_LINES) * Math.PI * 2;
    const cosT = Math.cos(theta), sinT = Math.sin(theta);
    
    const start = new THREE.Vector3(txPos.x + R_COIL * cosT, g.txY,   txPos.z + R_COIL * sinT);
    const end   = new THREE.Vector3(rxPos.x + R_COIL * cosT, AXIAL,   rxPos.z + R_COIL * sinT);
    const out1  = new THREE.Vector3(cosT, 0, sinT);
    
    const cp1 = start.clone().add(new THREE.Vector3(0,  h_eff * 0.55, 0)).addScaledVector(out1, bulge);
    const cp2 = end.clone()  .add(new THREE.Vector3(0, -h_eff * 0.55, 0)).addScaledVector(out1, bulge);
    
    const curve = new THREE.CubicBezierCurve3(start, cp1, cp2, end);
    g.curves[i] = curve;
    const pts = curve.getPoints(SAMPLES_PER_CURVE);
    g.lines[i].geometry.setFromPoints(pts);
  }
}

// ============================================================
//  数据加载 + 索引（修正全域最大值与横向对比）
// ============================================================
const status = document.getElementById('status');
let DATA = null;
let M_MAX = 1e-12;   // 互感保底最大值（专门用于渲染左侧 4 根物理互感柱状图比例）
let EFF_MAX = 1e-12; // 新增：两个算法全域范围内的绝对效率最大值（用于将系统整体效率最高点强制映射为 100%）
let currentMode = 'decoupled';

document.getElementById('algoSelect').addEventListener('change', (e) => {
  currentMode = e.target.value;
  sampleAt(rxCoil.position.x, rxCoil.position.z, true);
  buildSurface();
});

(async function load() {
  try {
    const resp = await fetch('array_data.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const j = await resp.json();
    DATA = j.data;

    // 核心改进：全量扫描网格
    for (const row of DATA) {
      // 1. 扫描互感最大绝对值
      const mMax = Math.max(Math.abs(row[2]), Math.abs(row[3]), Math.abs(row[4]), Math.abs(row[5]));
      if (mMax > M_MAX) M_MAX = mMax;

      // 2. 扫描跨算法、全域网格的最高系统效率（对比 row[10] 传统 与 row[15] 主动解耦）
      const effMax = Math.max(Math.abs(row[10]), Math.abs(row[15]));
      if (effMax > EFF_MAX) EFF_MAX = effMax;
    }
    
    status.textContent = '数据加载完成 — 拖拽金色 Rx 试试';
    setTimeout(() => { status.style.opacity = '0.45'; }, 1200);

    buildSurface();
    sampleAt(rxCoil.position.x, rxCoil.position.z, true);
  } catch (e) {
    status.textContent = '加载 array_data.json 失败：' + e.message
      + ' (请在 ' + location.host + ' 启动 HTTP 服务后再访问)';
  }
})();

function idxOf(x, y) {
  let ix = Math.round((x - GRID_MIN) / GRID_STEP);
  let iy = Math.round((y - GRID_MIN) / GRID_STEP);
  ix = Math.max(0, Math.min(N - 1, ix));
  iy = Math.max(0, Math.min(N - 1, iy));
  return iy * N + ix;
}

const elBars = [1,2,3,4].map(i => document.getElementById('bar' + i));
const elMs   = [1,2,3,4].map(i => document.getElementById('m' + i));
const elWs   = [1,2,3,4].map(i => document.getElementById('w' + i));
const elEff  = document.getElementById('eff');
const elCoords = document.getElementById('coords');
const elHint   = document.querySelector('.eff .hint');

function applyRow(row, rxX, rxZ) {
  if (!row) return;

  const M_raw = [row[2], row[3], row[4], row[5]];
  const M_abs = M_raw.map(m => Math.abs(m));

  let w, eff, hintText;
  if (currentMode === 'decoupled') {
    w = [row[11], row[12], row[13], row[14]];
    eff = row[15];
    hintText = "η = |Σ w_dec·Mᵢ| / (||w_dec|| · EFF_MAX)<br>[MIMO主动解耦 · 归一化场叠加效率]";
  } else {
    w = [row[6], row[7], row[8], row[9]];
    eff = row[10];
    hintText = "η = (Σ wᵢ·Mᵢ) / EFF_MAX<br>[传统最大比合并(MRC) · 归一化效率]";
  }

  for (let i = 0; i < 4; i++) {
    // 互感进度条继续使用 M_MAX，展示单线圈的物理强弱分布
    elBars[i].style.width = (Math.min(1, M_abs[i] / M_MAX) * 100).toFixed(1) + '%';
    elMs[i].textContent = (M_raw[i] * 1e9).toFixed(2) + ' nH';
    elWs[i].textContent = (w[i] * 100).toFixed(1) + '%';

    groups[i].speed     = 0.15 + 1.8 * Math.max(0, w[i]);
    groups[i].intensity = 0.05 + 2.0 * Math.max(0, w[i]);
    groups[i].lineMat.opacity = 0.15 + 0.75 * Math.max(0, w[i]);
    groups[i].partMat.opacity = 0.25 + 0.75 * Math.max(0, w[i]);
  }
  
  // 核心改动：用全局扫描到的绝对最大效率 EFF_MAX 作为基准分母进行比例收敛
  const normalizedEff = Math.abs(eff) / EFF_MAX;
  elEff.textContent = (normalizedEff * 100).toFixed(1) + ' %';
  
  if (elHint) elHint.innerHTML = hintText;
  elCoords.textContent = 'Rx (x, y) = (' + rxX.toFixed(1) + ', ' + rxZ.toFixed(1) + ') mm';

  updateSurfMarker(rxX, rxZ, normalizedEff);
}

function sampleAt(rxX, rxZ, rebuild) {
  if (!DATA) return;
  const row = DATA[idxOf(rxX, rxZ)];
  applyRow(row, rxX, rxZ);
  
  if (rebuild) {
    for (const g of groups) {
      rebuildCurves(g, rxX, rxZ);
    }
  }
}

// ============================================================
//  拖拽 Rx
// ============================================================
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -AXIAL);
let dragging = false;

function ndc(ev) {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
}

renderer.domElement.addEventListener('pointerdown', (ev) => {
  ndc(ev);
  raycaster.setFromCamera(pointer, camera);
  const hit = raycaster.intersectObject(rxCoil, true);
  if (hit.length) {
    dragging = true;
    controls.enabled = false;
    renderer.domElement.setPointerCapture(ev.pointerId);
  }
});

renderer.domElement.addEventListener('pointermove', (ev) => {
  if (!dragging) return;
  ndc(ev);
  raycaster.setFromCamera(pointer, camera);
  const p = new THREE.Vector3();
  if (raycaster.ray.intersectPlane(dragPlane, p)) {
    const x = Math.max(GRID_MIN, Math.min(GRID_MAX, p.x));
    const z = Math.max(GRID_MIN, Math.min(GRID_MAX, p.z));
    rxCoil.position.set(x, AXIAL, z);
    sampleAt(x, z, true);
  }
});

function endDrag(ev) {
  if (!dragging) return;
  dragging = false;
  controls.enabled = true;
  try { renderer.domElement.releasePointerCapture(ev.pointerId); } catch (_) {}
}
renderer.domElement.addEventListener('pointerup', endDrag);
renderer.domElement.addEventListener('pointercancel', endDrag);

// ============================================================
//  动画
// ============================================================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  controlsB.update();

  const dt = Math.min(clock.getDelta(), 0.05);

  for (const g of groups) {
    const cur = g.coilMat.emissiveIntensity;
    g.coilMat.emissiveIntensity = cur + (g.intensity - cur) * Math.min(1, dt * 8);

    for (const p of g.particles) {
      p.t += g.speed * dt;
      if (p.t >= 1) p.t -= 1;
      const c = g.curves[p.lineIdx];
      if (c) p.sprite.position.copy(c.getPoint(p.t));
    }
  }

  renderer.render(scene, camera);
  rendererB.render(sceneB, cameraB);
}

for (const g of groups) rebuildCurves(g, rxCoil.position.x, rxCoil.position.z);
animate();
</script>
